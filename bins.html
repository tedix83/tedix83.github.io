<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ted's Bin Tracker — anarkid.xyz</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
  <script>const ACTIVE_PAGE = 'projects';</script>
  <script src="components.js"></script>
  <style>
    body { display: flex; flex-direction: column; }

    .page-header { padding: 4rem 2rem 2rem; border-bottom: 3px solid var(--black); max-width: 860px; }
    .page-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 3px; color: var(--mint); background: var(--black); display: inline-block; padding: 0.3rem 0.8rem; margin-bottom: 1rem; }
    .page-header h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: clamp(2.5rem, 6vw, 4rem); line-height: 1.05; }
    .page-header p { margin-top: 1rem; color: #444; line-height: 1.7; max-width: 600px; }

    .embed-section {
      padding: 3rem 2rem 5rem;
      flex: 1;
    }

    .iframe-wrap {
      border: 3px solid var(--black);
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 700px;
      border: none;
      display: block;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 2rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--black);
      text-decoration: none;
      border-bottom: 2px solid var(--black);
      padding-bottom: 1px;
    }
    .back-link:hover { color: var(--pink); border-color: var(--pink); }
  </style>
</head>
<body>

  <div id="site-header"></div>

  <main>
    <div class="page-header">
      <div class="page-label">Project</div>
      <h1>Ted's Bin Tracker</h1>
      <p>A live feed of upcoming bin collections for my house, pulled from the South Gloucestershire Council API. You can also subscribe to the calendar feed to get reminders the night before.</p>
    </div>

    <div class="embed-section">
      <a class="back-link" href="projects.html">← Back to Projects</a>
      <div class="iframe-wrap">
        <iframe src="https://bins-app.onrender.com" title="Ted's Bin Tracker" loading="lazy"></iframe>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

</body>
</html>
